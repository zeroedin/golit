{{ define "imports" }}
  {{ range .Params.lightdom }}
  <link rel="stylesheet" href="/rhds/css/{{ . }}">
  {{ end }}
  <script type="module">
    import '@lit-labs/ssr-client/lit-element-hydrate-support.js';
    {{ range .Params.imports }}
    import '@rhds/elements/{{ . }}/{{ . }}.js';
    {{ end }}
  </script>
{{ end }}

{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
{{ end }}
