{{ define "imports" }}
  <link rel="stylesheet" href="/rhds/css/rh-tile-lightdom.css">
  <script type="module">
    import '@lit-labs/ssr-client/lit-element-hydrate-support.js';
    import '@rhds/elements/rh-tile/rh-tile.js';
  </script>
  <style>
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--rh-space-2xl, 32px);
      padding: var(--rh-space-2xl, 32px) var(--rh-space-xl, 24px);
    }
  </style>
{{ end }}

{{ define "main" }}
<div class="tile-grid">
  {{ range (where .Site.RegularPages "Section" "elements") }}
  <rh-tile>
    <h2 slot="headline"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <code>&lt;{{ .File.ContentBaseName }}&gt;</code>
  </rh-tile>
  {{ end }}
</div>
{{ end }}
